<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - English Learning</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <h1 onclick="window.location.href='/'" style="cursor: pointer; margin: 0;">
                📚 English Learning
            </h1>

            <nav style="display: flex; align-items: center; gap: 25px;">
                <a href="/" id="nav-topics">Темы</a>
                <a href="/leaderboard" id="nav-leaderboard">🏆 Рейтинг</a>
                <a href="/contacts" id="nav-contacts">Контакты</a>

                <span style="width: 1px; height: 20px; background: var(--border-color);"></span>

                <a href="/profile" id="nav-profile">Профиль</a>
                <a href="/admin" id="nav-admin" style="display:none;"> Админка</a>
                <button id="logoutBtn" style="display:none;" class="btn btn-outline" onclick="logout()">Выйти</button>
                <a href="/login" id="nav-login">Войти</a>
            </nav>

            <button class="theme-toggle" onclick="toggleTheme()" title="Сменить тему"
                    style="margin-left: 20px; font-size: 1.3rem;">🌙</button>
        </div>
    </header>

    <main class="container" style="padding-top: 50px; max-width: 450px;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 30px;">Создать аккаунт 🚀</h2>

            <div id="alert" style="display: none; margin-bottom: 20px;"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="regUsername">Имя пользователя</label>
                    <input type="text" id="regUsername" placeholder="Придумайте логин" required minlength="3">
                </div>

                <div class="form-group">
                    <label for="regPassword">Пароль</label>
                    <input type="password" id="regPassword" placeholder="Придумайте пароль" required minlength="4">
                </div>

                <div class="form-group">
                    <label for="regConfirmPassword">Повторите пароль</label>
                    <input type="password" id="regConfirmPassword" placeholder="Повторите пароль" required>
                </div>

                <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 10px;">
                    Зарегистрироваться
                </button>
            </form>

            <div style="text-align: center; margin-top: 25px;">
                <p style="color: var(--text-secondary);">
                    Уже есть аккаунт? <a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 600;">Войти</a>
                </p>
            </div>
        </div>
    </main>

    <script src="/static/script.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthUI();
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password !== confirmPassword) {
                showAlert('Пароли не совпадают!', 'error');
                return;
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });

                const data = await res.json();

                if (res.ok) {
                    showAlert('Регистрация успешна! Перенаправляем на вход...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    showAlert(data.detail || 'Ошибка регистрации', 'error');
                }
            } catch (err) {
                showAlert('Ошибка соединения с сервером', 'error');
            }
        });
    </script>
</body>
</html>

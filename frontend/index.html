<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <h1 onclick="window.location.href='/'" style="cursor: pointer; margin: 0;">
                📚 English Learning
            </h1>

            <nav style="display: flex; align-items: center; gap: 25px;">
                <a href="/" id="nav-topics" class="active">Темы</a>
                <a href="/leaderboard" id="nav-leaderboard">🏆 Рейтинг</a>
                <a href="/contacts" id="nav-contacts">Контакты</a>

                <span style="width: 1px; height: 20px; background: var(--border-color);"></span>

                <a href="/profile" id="nav-profile">Профиль</a>
                <a href="/admin" id="nav-admin" style="display:none;">🔧 Админка</a>
                <button id="logoutBtn" style="display:none;" class="btn btn-outline" onclick="logout()">Выйти</button>
                <a href="/login" id="nav-login">Войти</a>
            </nav>

            <button class="theme-toggle" onclick="toggleTheme()" title="Сменить тему"
                    style="margin-left: 20px; font-size: 1.3rem;">🌙</button>
        </div>
    </header>

    <main class="container" style="padding-top: 30px;">
        <div class="card text-center">
            <h2>Добро пожаловать! 👋</h2>
            <p style="color: var(--text-secondary);">
                Выберите тему для изучения или войдите в систему, чтобы следить за своим прогрессом.
            </p>
        </div>

        <h2 style="margin-top: 30px; margin-bottom: 20px;">📖 Доступные темы</h2>

        <div id="topicsList" class="topics-grid">
            <p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary);">Загрузка тем...</p>
        </div>
    </main>

    <script src="/static/script.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('nav a').forEach(link => link.classList.remove('active'));
            const activeLink = document.getElementById('nav-topics');
            if (activeLink) activeLink.classList.add('active');

            checkAuthUI();
            loadTopics();
        });
    </script>
</body>
</html>

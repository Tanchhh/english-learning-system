<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рейтинг - 📚 English Learning</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .leaderboard-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .leaderboard-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .leaderboard-header h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .leaderboard-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .leader-item {
            display: flex;
            align-items: center;
            padding: 20px;
            margin-bottom: 15px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 16px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .leader-item:hover {
            transform: translateX(10px);
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.15);
        }

        .leader-item.top-1 {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.2) 0%, rgba(245, 158, 11, 0.1) 100%);
            border-color: #fbbf24;
            animation: goldGlow 2s ease-in-out infinite;
        }

        .leader-item.top-2 {
            background: linear-gradient(135deg, rgba(148, 163, 184, 0.2) 0%, rgba(100, 116, 139, 0.1) 100%);
            border-color: #94a3b8;
        }

        .leader-item.top-3 {
            background: linear-gradient(135deg, rgba(180, 83, 9, 0.2) 0%, rgba(146, 64, 14, 0.1) 100%);
            border-color: #b45309;
        }

        @keyframes goldGlow {
            0%, 100% { box-shadow: 0 0 0 rgba(251, 191, 36, 0); }
            50% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
        }

        .leader-rank {
            font-size: 2rem;
            font-weight: bold;
            width: 70px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .leader-rank.gold {
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }
        .leader-rank.silver { color: #94a3b8; }
        .leader-rank.bronze { color: #b45309; }
        .leader-rank.normal { color: var(--text-secondary); }

        .leader-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0 20px;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }

        .leader-info {
            flex: 1;
        }

        .leader-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .leader-progress {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .progress-bar {
            width: 150px;
            height: 8px;
            background: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .leader-score {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary);
            min-width: 80px;
            text-align: right;
        }

        .leader-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .empty-leaderboard {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <h1 onclick="window.location.href='/'" style="cursor: pointer; margin: 0;">
                📚 English Learning
            </h1>

            <nav style="display: flex; align-items: center; gap: 25px;">
                <a href="/" id="nav-topics">Темы</a>
                <a href="/leaderboard" id="nav-leaderboard" class="active">🏆 Рейтинг</a>
                <a href="/contacts" id="nav-contacts">Контакты</a>

                <span style="width: 1px; height: 20px; background: var(--border-color);"></span>

                <a href="/profile" id="nav-profile">Профиль</a>
                <a href="/admin" id="nav-admin" style="display:none;">🔧 Админка</a>
                <button id="logoutBtn" style="display:none;" class="btn btn-outline" onclick="logout()">Выйти</button>
                <a href="/login" id="nav-login">Войти</a>
            </nav>

            <button class="theme-toggle" onclick="toggleTheme()" title="Сменить тему"
                    style="margin-left: 20px; font-size: 1.3rem;">🌙</button>
        </div>
    </header>

    <main class="container">
        <div class="leaderboard-container">
            <div class="leaderboard-header">
                <h2>🏆 Таблица лидеров</h2>
                <p style="color: var(--text-secondary);">Самые активные учащиеся этой недели</p>
            </div>

            <div class="leaderboard-card">
                <div id="leadersList">
                    <div class="empty-leaderboard">
                        <div class="empty-icon">🥇</div>
                        <h3>Стань первым!</h3>
                        <p>Проходи темы, выполняй упражнения и поднимайся в рейтинге</p>
                    </div>
                </div>
            </div>

            <div style="text-align: center; margin-top: 30px; color: var(--text-secondary); font-size: 0.9rem;">
                <p>📊 Рейтинг обновляется ежедневно в 00:00</p>
            </div>
        </div>
    </main>

    <script src="/static/script.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('nav a').forEach(link => link.classList.remove('active'));
            document.getElementById('nav-leaderboard')?.classList.add('active');

            checkAuthUI();
            loadLeaderboard();
        });

        async function loadLeaderboard() {
            try {
                const leaders = [
                    { id: 1, name: 'admin', progress: 100, score: 2450, streak: 15, isOnline: true },
                    { id: 2, name: 'Maria', progress: 83, score: 1890, streak: 12, isOnline: true },
                    { id: 3, name: 'Alex', progress: 66, score: 1420, streak: 8, isOnline: false },
                    { id: 4, name: 'Ivan', progress: 50, score: 980, streak: 5, isOnline: true },
                    { id: 5, name: 'Elena', progress: 33, score: 650, streak: 3, isOnline: false },
                    { id: 6, name: 'Dmitry', progress: 16, score: 320, streak: 1, isOnline: false }
                ];

                const container = document.getElementById('leadersList');

                if (leaders.length === 0) {
                    container.innerHTML = `
                        <div class="empty-leaderboard">
                            <div class="empty-icon">🥇</div>
                            <h3>Стань первым!</h3>
                            <p>Проходи темы, выполняй упражнения и поднимайся в рейтинге</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = leaders.map((l, i) => {
                    const rankClass = i === 0 ? 'gold' : (i === 1 ? 'silver' : (i === 2 ? 'bronze' : 'normal'));
                    const rowClass = i === 0 ? 'top-1' : (i === 1 ? 'top-2' : (i === 2 ? 'top-3' : ''));

                    return `
                        <div class="leader-item ${rowClass}">
                            <div class="leader-rank ${rankClass}">#${i + 1}</div>
                            <div class="leader-avatar">${l.name.charAt(0).toUpperCase()}</div>
                            <div class="leader-info">
                                <div class="leader-name">
                                    ${l.name}
                                    ${l.isOnline ? '<span class="leader-badge">🟢 Онлайн</span>' : ''}
                                </div>
                                <div class="leader-progress">
                                    Прогресс: ${l.progress}%
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${l.progress}%"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="leader-score">${l.score} XP</div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('Ошибка загрузки рейтинга:', error);
                document.getElementById('leadersList').innerHTML = `
                    <div class="empty-leaderboard">
                        <div class="empty-icon">⚠️</div>
                        <h3>Не удалось загрузить рейтинг</h3>
                        <p>Попробуйте обновить страницу</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>

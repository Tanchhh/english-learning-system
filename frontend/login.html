<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - English Learning</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <h1 onclick="window.location.href='/'" style="cursor: pointer; margin: 0;">
                📚 English Learning
            </h1>

            <nav style="display: flex; align-items: center; gap: 25px;">
                <a href="/" id="nav-topics">Темы</a>
                <a href="/leaderboard" id="nav-leaderboard">🏆 Рейтинг</a>
                <a href="/contacts" id="nav-contacts">Контакты</a>

                <span style="width: 1px; height: 20px; background: var(--border-color);"></span>

                <a href="/profile" id="nav-profile">Профиль</a>
                <a href="/admin" id="nav-admin" style="display:none;">🔧 Админка</a>
                <button id="logoutBtn" style="display:none;" class="btn btn-outline" onclick="logout()">Выйти</button>
                <a href="/login" id="nav-login" class="active">Войти</a>
            </nav>

            <button class="theme-toggle" onclick="toggleTheme()" title="Сменить тему"
                    style="margin-left: 20px; font-size: 1.3rem;">🌙</button>
        </div>
    </header>

    <main class="container" style="padding-top: 50px; max-width: 450px;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 30px;">Вход в систему 👋</h2>

            <div id="alert" style="display: none; margin-bottom: 20px;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" placeholder="Введите ваш логин" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                    Войти
                </button>
            </form>

            <div style="text-align: center; margin-top: 25px;">
                <p style="color: var(--text-secondary);">
                    Нет аккаунта? <a href="/register" style="color: var(--primary); text-decoration: none; font-weight: 600;">Зарегистрироваться</a>
                </p>
            </div>

            <div style="text-align: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color);">
                <small style="color: var(--text-secondary);">
                </small>
            </div>

        </div>
    </main>

    <script src="/static/script.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('nav a').forEach(link => link.classList.remove('active'));
            document.getElementById('nav-login')?.classList.add('active');
            checkAuthUI();
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showAlert('Заполните все поля', 'error');
                return;
            }

            try {
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);

                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({ detail: 'Ошибка сервера' }));
                    throw new Error(err.detail || 'Неверный логин или пароль');
                }

                const data = await res.json();

                localStorage.setItem('token', data.access_token);
                localStorage.setItem('isAdmin', data.is_admin);
                localStorage.setItem('username', data.username);

                window.location.href = '/profile';

            } catch (err) {
                showAlert(err.message, 'error');
            }
        });
    </script>
</body>
</html>
